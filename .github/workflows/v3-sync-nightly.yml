name: v3 FitnessBoard Nightly Sync

# Pulls the v3.fitnessboard.in payment export for each gym and POSTs it
# back to the gym's TraqGym instance for upsert into Postgres.
#
# Cron: 21:00 UTC = 02:30 IST. Picked to avoid the IST business day so
#       the sync isn't competing with the gym's live traffic.
#
# Manual trigger: workflow_dispatch (useful for first-run / debugging).
#
# See scripts/v3-sync/README.md for the full pipeline diagram + how to
# add a new gym.

on:
  schedule:
    - cron: "0 21 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      # Don't let one gym's failure abort the others.
      fail-fast: false
      matrix:
        include:
          - gym: freeformfitness
            base_url: https://freeformfitness.traqgym.com
            secret_name: INTERNAL_API_SECRET_FREEFORM
          - gym: egymlokhandwala
            base_url: https://egymlokhandwala.traqgym.com
            secret_name: INTERNAL_API_SECRET_EGYM

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v3 sync
        env:
          GYM_BASE_URL: ${{ matrix.base_url }}
          GYM_NAME: ${{ matrix.gym }}
          SECRET_NAME: ${{ matrix.secret_name }}
          # Resolve per-gym secret by name. Each gym has its own secret so
          # one leak doesn't open the others. The secret must match the
          # gym's deployed INTERNAL_API_SECRET env var on Vercel.
          INTERNAL_API_SECRET: ${{ secrets[matrix.secret_name] }}
        run: |
          if [ -z "$INTERNAL_API_SECRET" ]; then
            echo "::error::Secret $SECRET_NAME is not set for $GYM_NAME."
            exit 1
          fi
          python3 scripts/v3-sync/sync.py
