name: refresh-gym-data
on:
  schedule:
    # 01:15 UTC = 06:45 IST. Off the popular top/bottom-of-hour slot
    # to dodge the GitHub Actions scheduler pile-up that was drifting
    # our 00:30 cron to ~04:45 UTC and into a window where FB returns
    # successful-but-empty payloads. Still well clear of the 03:30 UTC
    # (09:00 IST) digest cron.
    - cron: "15 1 * * *"
  workflow_dispatch:
    inputs:
      allow_shrunk_snapshot:
        description: "Bypass the >50% relative-drop guard in upload-blob.mjs (operator-only — use when a deliberate scope change legitimately shrinks the snapshot)"
        type: boolean
        default: false
jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    strategy:
      # Don't let one gym's failure cancel the others.
      fail-fast: false
      matrix:
        gym: [freeform, egym]
    env:
      FB_MOBILE: ${{ secrets.FB_MOBILE }}
      # All passwords visible to every matrix run; the bash step picks
      # the right one by gym slug. GitHub Actions doesn't allow
      # dynamic `secrets[matrix.var]` indexing, so this is the
      # standard workaround.
      FB_PASSWORD_FREEFORM: ${{ secrets.FB_PASSWORD_FREEFORM }}
      FB_PASSWORD_EGYM: ${{ secrets.FB_PASSWORD_EGYM }}
      FB_OUT_DIR: /tmp/csvs-${{ matrix.gym }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Python deps
        run: pip install -r telegram-bot/scripts/requirements-cron.txt
      - name: Install Node deps (Blob SDK + papaparse for upload integrity check)
        working-directory: telegram-bot
        run: npm install --omit=dev @vercel/blob papaparse
      # Fetch + upload are wrapped in a single retry-once-on-failure step.
      # The actual failure mode 3 days running was: fetch_complete.py exits
      # 0 having quietly produced empty payloads (FB returns success-but-empty
      # under load), then upload-blob.mjs exits 2 at the row-floor guard.
      # So the retry MUST wrap both — retrying fetch alone changes nothing.
      # 10-minute pause between attempts gives FB time to recover; the job's
      # 60-minute timeout absorbs a second full run comfortably.
      - name: Fetch + upload (one retry on failure) — ${{ matrix.gym }}
        env:
          GYM: ${{ matrix.gym }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.VERCEL_BLOB_RW_TOKEN }}
          ALLOW_SHRUNK_SNAPSHOT: ${{ inputs.allow_shrunk_snapshot && 'true' || 'false' }}
        run: |
          # Bash variable indirection: FB_PASSWORD = $FB_PASSWORD_<GYM_UPPER>
          GYM_UPPER=$(echo "$GYM" | tr '[:lower:]' '[:upper:]')
          PWD_VAR="FB_PASSWORD_${GYM_UPPER}"
          export FB_PASSWORD="${!PWD_VAR}"
          if [ -z "$FB_PASSWORD" ]; then
            echo "ERROR: $PWD_VAR is empty — secret not set?"
            exit 1
          fi
          mkdir -p "$FB_OUT_DIR"
          for attempt in 1 2; do
            echo "::group::Attempt $attempt — fetch"
            python freeformfitness-data-export-fresh/fetch_complete.py
            fetch_rc=$?
            echo "::endgroup::"
            if [ "$fetch_rc" -eq 0 ]; then
              echo "::group::Attempt $attempt — upload"
              node telegram-bot/scripts/upload-blob.mjs "$FB_OUT_DIR" --gym "$GYM"
              upload_rc=$?
              echo "::endgroup::"
              if [ "$upload_rc" -eq 0 ]; then
                echo "Attempt $attempt succeeded."
                exit 0
              fi
            fi
            if [ "$attempt" = "2" ]; then
              echo "Both attempts failed — giving up."
              exit 1
            fi
            echo "Attempt $attempt failed. Sleeping 600s before retry to let FB recover."
            sleep 600
            # Clean stale output dir so we don't conflate runs.
            rm -rf "$FB_OUT_DIR" && mkdir -p "$FB_OUT_DIR"
          done
