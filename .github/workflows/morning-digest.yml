name: morning-digest
on:
  schedule:
    - cron: "30 3 * * *"     # 03:30 UTC = 09:00 IST, after CSV refresh
  workflow_dispatch:
jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger digest endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          DIGEST_URL: https://freeform-telegram-bot.vercel.app/api/digest
        run: |
          curl --fail-with-body -sS -X POST "$DIGEST_URL" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json"
