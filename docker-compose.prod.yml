services:
  # --- Landing page ---
  landing:
    build: ./landing
    container_name: traqgym-landing
    networks:
      - traqgym

  # --- Reverse proxy ---
  caddy:
    image: caddy:2-alpine
    container_name: traqgym-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - landing
    networks:
      - traqgym

volumes:
  caddy_data:
  caddy_config:

networks:
  traqgym:
    driver: bridge
