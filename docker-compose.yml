services:
  postgres:
    image: postgres:16
    container_name: freeformfitness-postgres
    environment:
      POSTGRES_DB: freeformfitness
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pg-gym1:
    image: postgres:16
    container_name: traqgym-pg-gym1
    environment:
      POSTGRES_DB: traqgym_gym1
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - pgdata-gym1:/var/lib/postgresql/data

  pg-gym2:
    image: postgres:16
    container_name: traqgym-pg-gym2
    environment:
      POSTGRES_DB: traqgym_gym2
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - pgdata-gym2:/var/lib/postgresql/data

volumes:
  pgdata:
  pgdata-gym1:
  pgdata-gym2:
